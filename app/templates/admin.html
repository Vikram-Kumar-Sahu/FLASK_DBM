<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Admin Dashboard</h2>

<a href="/dashboard" class="btn btn-secondary mb-3">Back</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Grade</th>
            <th>Assign Grade</th>
        </tr>
    </thead>
    <tbody>

        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.grade }}</td>
            <td>
                <form method="POST" action="/assign_grade/{{ user.id }}">
                    <input type="text" name="grade" placeholder="Enter Grade" required>
                    <button class="btn btn-primary btn-sm">Update</button>
                </form>
            </td>
        </tr>
        {% endfor %}

    </tbody>
</table>

</body>
</html>
